<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yahtzee Score">
<title>Yahtzee Scoreboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.14.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;700;900&family=Playfair+Display:ital@1&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; background: #fdfcf0; font-family: 'Inter', sans-serif; }
  .font-hand { font-family: 'Caveat', cursive; }
  .font-serif { font-family: 'Playfair Display', serif; }
  :root { --accent: #e63946; }
  .text-accent { color: var(--accent); }
  .bg-accent { background: var(--accent); }
  @keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }
  .animate-bounce { animation: bounce 1s infinite; }
</style>
<script>
  tailwind.config = { theme: { extend: { colors: { accent: '#e63946' } } } }
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const CATEGORY_LABELS = {
  ones:'Ones', twos:'Twos', threes:'Threes', fours:'Fours', fives:'Fives', sixes:'Sixes',
  twoPairs:'2 Pairs', threePairs:'3 Pairs', fourOfAKind:'4 of a Kind',
  fullHouse:'Full House', allRed:'All Red', lowestPoint:'Lowest Point',
  largeStraight:'Large Straight', yahtzee5:'Yahtzee (5)', yahtzee6:'Yahtzee (6)', chance:'Chance',
};
const CATEGORY_DESCRIPTIONS = {
  ones:'Sum of 1s only', twos:'Sum of 2s only', threes:'Sum of 3s only',
  fours:'Sum of 4s only', fives:'Sum of 5s only', sixes:'Sum of 6s only',
  twoPairs:'Two pairs — sum of all dice', threePairs:'Three pairs — sum of all dice',
  fourOfAKind:'4 same — sum + 20 bonus', fullHouse:'3+2 or 4+2 — sum + 30 bonus',
  allRed:'All 1s or 4s — fixed 40 pts', lowestPoint:'Sum<=8: 30 | 9-11: 20 | 12-14: 10 pts',
  largeStraight:'5 consecutive — fixed 45 pts', yahtzee5:'5 same — sum + 50 bonus',
  yahtzee6:'6 same — sum + 75 bonus', chance:'Sum of all dice',
};
const CATEGORY_BONUSES = {
  ones:0, twos:0, threes:0, fours:0, fives:0, sixes:0,
  twoPairs:0, threePairs:0, fourOfAKind:20, fullHouse:30,
  allRed:0, lowestPoint:0, largeStraight:0, yahtzee5:50, yahtzee6:75, chance:0,
};
const UPPER_CATS = ['ones','twos','threes','fours','fives','sixes'];
const LOWER_CATS = ['twoPairs','threePairs','fourOfAKind','fullHouse','allRed','lowestPoint','largeStraight','yahtzee5','yahtzee6','chance'];
const ALL_CATS = [...UPPER_CATS, ...LOWER_CATS];

function getCounts(dice) {
  return dice.reduce((acc, d) => { acc[d] = (acc[d]||0)+1; return acc; }, {});
}
const CALC_POINTS = {
  ones:(d)=>d.filter(x=>x===1).reduce((a,b)=>a+b,0),
  twos:(d)=>d.filter(x=>x===2).reduce((a,b)=>a+b,0),
  threes:(d)=>d.filter(x=>x===3).reduce((a,b)=>a+b,0),
  fours:(d)=>d.filter(x=>x===4).reduce((a,b)=>a+b,0),
  fives:(d)=>d.filter(x=>x===5).reduce((a,b)=>a+b,0),
  sixes:(d)=>d.filter(x=>x===6).reduce((a,b)=>a+b,0),
  twoPairs:(d)=>{const c=Object.values(getCounts(d)).filter(v=>v>=2);const s=d.reduce((a,b)=>a+b,0);return c.length>=2?s:0;},
  threePairs:(d)=>{const c=Object.values(getCounts(d)).filter(v=>v>=2);const s=d.reduce((a,b)=>a+b,0);return c.length>=3?s:0;},
  fourOfAKind:(d)=>{const s=d.reduce((a,b)=>a+b,0);return Object.values(getCounts(d)).some(c=>c>=4)?s+20:0;},
  fullHouse:(d)=>{const sc=Object.values(getCounts(d)).sort((a,b)=>b-a);const s=d.reduce((a,b)=>a+b,0);return sc[0]>=3&&sc[1]>=2?s+30:0;},
  allRed:(d)=>d.every(x=>x===1||x===4)?40:0,
  lowestPoint:(d)=>{const s=d.reduce((a,b)=>a+b,0);if(s<=8)return 30;if(s<=11)return 20;if(s<=14)return 10;return 0;},
  largeStraight:(d)=>{const u=Array.from(new Set(d)).sort((a,b)=>a-b);let max=0,cur=0;for(let i=0;i<u.length;i++){if(i>0&&u[i]===u[i-1]+1)cur++;else cur=1;max=Math.max(max,cur);}return max>=5?45:0;},
  yahtzee5:(d)=>{const s=d.reduce((a,b)=>a+b,0);return Object.values(getCounts(d)).some(c=>c>=5)?s+50:0;},
  yahtzee6:(d)=>{const s=d.reduce((a,b)=>a+b,0);return Object.values(getCounts(d)).some(c=>c>=6)?s+75:0;},
  chance:(d)=>d.reduce((a,b)=>a+b,0),
};

function computeManualScore(category, sum) {
  if (!sum && sum !== 0) return null;
  if (category === 'allRed') return sum > 0 ? 40 : 0;
  if (category === 'largeStraight') return sum > 0 ? 45 : 0;
  if (category === 'lowestPoint') {
    if (sum <= 8) return 30; if (sum <= 11) return 20; if (sum <= 14) return 10; return 0;
  }
  return sum + (sum > 0 ? CATEGORY_BONUSES[category] : 0);
}

const getVal = v => v === 'scratch' ? 0 : (v || 0);
const calcUpper = s => UPPER_CATS.reduce((a,k) => a + getVal(s[k]), 0);
const calcBonus = u => u >= 63 ? 35 : 0;
const calcLower = s => LOWER_CATS.reduce((a,k) => a + getVal(s[k]), 0);
const calcTotal = s => { const u = calcUpper(s); return u + calcBonus(u) + calcLower(s); };

const genId = () => { try { return crypto.randomUUID(); } catch(e) { return Math.random().toString(36).slice(2)+Date.now().toString(36); }};
const genMatchNum = () => Math.floor(Math.random()*9000+1000);
const lsGet = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }};
const lsSet = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} };

const DOT_POS = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
function Die({ value }) {
  const dots = DOT_POS[value] || [];
  return (
    <div className="grid grid-cols-3 gap-0.5 w-full h-full p-2">
      {[...Array(9)].map((_,i) => (
        <div key={i} className="flex items-center justify-center">
          {dots.includes(i) && <div className="w-2.5 h-2.5 rounded-full bg-blue-600" />}
        </div>
      ))}
    </div>
  );
}

const PAPER = { backgroundImage: 'url("https://www.transparenttextures.com/patterns/natural-paper.png")' };

function ConfirmModal({ message, onConfirm, onCancel }) {
  return (
    <div className="fixed inset-0 bg-blue-900/40 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
      <div className="bg-[#fdfcf0] border-[6px] border-[#dcd7c9] p-10 shadow-[24px_24px_0px_rgba(0,0,0,0.1)] max-w-sm w-full text-center relative">
        <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER} />
        <p className="text-3xl font-hand text-blue-900 mb-8 leading-tight relative z-10">{message}</p>
        <div className="grid grid-cols-2 gap-4 relative z-10">
          <button onClick={onConfirm} className="py-4 bg-blue-900 text-white font-black uppercase text-sm tracking-widest hover:bg-blue-800 transition-colors">Confirm</button>
          <button onClick={onCancel} className="py-4 border-4 border-[#dcd7c9] text-blue-900 font-black uppercase text-sm tracking-widest hover:bg-white transition-colors">Cancel</button>
        </div>
      </div>
    </div>
  );
}

function SectionHeader({ title }) {
  return (
    <tr className="bg-[#dcd7c9]/30">
      <td colSpan={100} className="p-1 px-4">
        <span className="text-[10px] font-black uppercase tracking-[2px] text-blue-900">{title}</span>
      </td>
    </tr>
  );
}

function ScoreRow({ category, players, onClick }) {
  const bonus = CATEGORY_BONUSES[category] || 0;
  return (
    <tr className="border-b-2 last:border-0 group transition-colors hover:bg-blue-50/50 border-[#dcd7c9]/50">
      <td className="p-3 font-black text-sm uppercase tracking-tighter border-r-4 sticky left-0 z-10 bg-[#fdfcf0] border-[#dcd7c9] group-hover:bg-[#f5f2e8] transition-colors">
        <div className="flex flex-col gap-0.5">
          <span>{CATEGORY_LABELS[category]}</span>
          <span className="text-[8px] font-bold text-gray-400 normal-case whitespace-nowrap">{CATEGORY_DESCRIPTIONS[category]}</span>
          {bonus > 0 && <span className="text-[9px] px-1 py-0.5 bg-blue-100 text-blue-800 w-fit">+{bonus}</span>}
        </div>
      </td>
      {players.map((player, idx) => {
        const val = player.scores[category];
        const filled = val !== undefined;
        return (
          <td key={player.id} onClick={() => onClick(idx)}
            className={`p-4 text-center cursor-pointer border-l-2 transition-all font-black text-2xl border-[#dcd7c9]/50 ${
              filled ? (val === 'scratch' ? 'text-red-400 italic text-base' : 'text-blue-800 font-hand text-3xl') : 'text-[#dcd7c9]/40 hover:text-blue-400'
            }`}>
            {filled ? (val === 'scratch' ? 'X' : val) : '—'}
          </td>
        );
      })}
    </tr>
  );
}

function SummaryRow({ title, valueFn, players }) {
  return (
    <tr className="border-b-2 bg-[#f5f2e8] border-[#dcd7c9]">
      <td className="p-3 font-black text-[10px] uppercase tracking-[2px] opacity-40 sticky left-0 z-10 border-r-4 bg-[#f5f2e8] border-[#dcd7c9]">{title}</td>
      {players.map(p => (
        <td key={p.id} className="p-3 text-center border-l-2 font-black text-lg italic border-[#dcd7c9]/50 text-blue-950/40">{valueFn(p.scores)}</td>
      ))}
    </tr>
  );
}

function App() {
  const [game, setGame] = useState(() => {
    const saved = lsGet('ytz_game', null);
    if (saved?.players && Array.isArray(saved.players)) return saved;
    return { players: [], status: 'setup', mode: 'free', currentIdx: 0, matchNum: genMatchNum(), id: genId() };
  });

  useEffect(() => { lsSet('ytz_game', game); }, [game]);

  const [newName, setNewName] = useState('');
  const [selCat, setSelCat] = useState(null);
  const [dice, setDice] = useState([1,1,1,1,1,1]);
  const [manualInput, setManualInput] = useState('');
  const [turnProcessing, setTurnProcessing] = useState(false);
  const [showFinalBoard, setShowFinalBoard] = useState(false);
  const [confirm, setConfirm] = useState(null);

  const toggleDie = (i, dir=1) => setDice(prev => {
    const n = [...prev]; n[i] = ((n[i]-1+dir+6)%6)+1; return n;
  });

  const addPlayer = () => {
    if (!newName.trim()) return;
    setGame(g => ({ ...g, players: [...g.players, { id: genId(), name: newName.trim(), scores: {} }] }));
    setNewName('');
  };
  const removePlayer = id => setGame(g => ({ ...g, players: g.players.filter(p => p.id !== id) }));
  const movePlayer = (idx, dir) => setGame(g => {
    const ps = [...g.players], ni = dir === 'up' ? idx-1 : idx+1;
    if (ni < 0 || ni >= ps.length) return g;
    const [m] = ps.splice(idx, 1); ps.splice(ni, 0, m);
    return { ...g, players: ps };
  });

  const freshGame = (keep) => ({
    ...keep,
    id: genId(), matchNum: genMatchNum(), status: 'playing', currentIdx: 0,
    players: keep.players.map(p => ({ ...p, scores: {} })),
  });

  const startGame = () => game.players.length && setGame(g => ({ ...g, status: 'playing', matchNum: genMatchNum(), id: genId() }));
  const resetGame = () => setConfirm({ msg: 'Start a new match? All scores will be cleared.', fn: () => { setGame(g => freshGame(g)); setConfirm(null); }});
  const rematch = () => { setGame(g => freshGame(g)); setShowFinalBoard(false); setDice([1,1,1,1,1,1]); };
  const backToSetup = () => {
    if (game.status === 'playing' && game.players.some(p => Object.keys(p.scores).length > 0)) {
      setConfirm({ msg: 'Return to setup? Progress will be paused.', fn: () => { setGame(g => ({ ...g, status: 'setup' })); setConfirm(null); }});
    } else setGame(g => ({ ...g, status: 'setup' }));
  };

  const updateScore = (playerIndex, category, score) => {
    setGame(prev => {
      const newPlayers = prev.players.map((p,i) => i === playerIndex ? { ...p, scores: { ...p.scores, [category]: score } } : p);
      const done = newPlayers.every(p => Object.keys(p.scores).length === ALL_CATS.length);
      const nextIdx = prev.mode === 'turn-based' ? (prev.currentIdx+1) % prev.players.length : prev.currentIdx;
      return { ...prev, players: newPlayers, currentIdx: nextIdx, status: done ? 'finished' : prev.status };
    });
    setSelCat(null); setManualInput(''); setTurnProcessing(false); setDice([1,1,1,1,1,1]);
  };

  const submitManual = () => {
    if (!selCat || manualInput === '') return;
    const sum = Number(manualInput);
    if (isNaN(sum)) return;
    const final = computeManualScore(selCat.category, sum);
    if (final !== null) updateScore(selCat.playerIndex, selCat.category, final);
  };

  if (game.status === 'setup') return (
    <div className="min-h-screen p-6 md:p-12 flex flex-col items-center border-[12px] bg-[#fdfcf0] text-[#1a1a1a] border-[#dcd7c9] relative">
      <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER} />
      <header className="max-w-2xl w-full mb-12 border-b-4 pb-10 border-[#dcd7c9]">
        <h1 className="text-[clamp(60px,15vw,120px)] font-black tracking-[-6px] uppercase leading-[0.8] font-hand text-blue-900">Yahtzee</h1>
        <p className="font-bold tracking-[3px] uppercase mt-4">Scoreboard v2.0</p>
      </header>
      <div className="max-w-md w-full border-4 border-black p-8 bg-white">
        <div className="flex gap-2 mb-8">
          <input type="text" value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addPlayer()} placeholder="PLAYER NAME"
            className="flex-1 px-4 py-4 border-2 border-black rounded-none focus:outline-none focus:bg-gray-50 font-black uppercase text-sm tracking-widest" />
          <button onClick={addPlayer} className="bg-blue-900 text-white px-6 font-black hover:bg-blue-800 transition-colors">ADD</button>
        </div>
        <div className="space-y-3 mb-8">
          {game.players.map((p, idx) => (
            <div key={p.id} className="flex items-center justify-between p-4 border-2 border-[#dcd7c9] bg-[#f5f2e8]/50">
              <div className="flex items-center gap-3">
                <div className="flex flex-col gap-0.5">
                  <button onClick={() => movePlayer(idx,'up')} disabled={idx===0} className="text-[#dcd7c9] hover:text-blue-900 disabled:opacity-20 text-xs">▲</button>
                  <button onClick={() => movePlayer(idx,'down')} disabled={idx===game.players.length-1} className="text-[#dcd7c9] hover:text-blue-900 disabled:opacity-20 text-xs">▼</button>
                </div>
                <div className="w-7 h-7 bg-blue-900 text-white flex items-center justify-center font-black text-xs">#{idx+1}</div>
                <span className="font-hand text-2xl text-blue-800">{p.name}</span>
              </div>
              <button onClick={() => removePlayer(p.id)} className="text-gray-400 hover:text-red-500 transition-colors">✕</button>
            </div>
          ))}
          {game.players.length === 0 && (
            <p className="text-center py-10 text-gray-400 font-serif italic border-2 border-dashed border-[#dcd7c9]">Add players to begin</p>
          )}
        </div>
        <div className="mb-8 p-4 border-2 border-[#dcd7c9] bg-[#f5f2e8]/50">
          <label className="text-xs font-black uppercase tracking-widest block mb-3">Game Mode</label>
          <div className="grid grid-cols-2 gap-2">
            {['free','turn-based'].map(m => (
              <button key={m} onClick={() => setGame(g => ({ ...g, mode: m }))}
                className={`py-3 font-black uppercase text-xs tracking-widest border-2 transition-all ${game.mode===m?'bg-blue-900 text-white border-blue-900':'bg-white text-blue-900 border-[#dcd7c9]'}`}>
                {m==='free'?'Free Score':'Turn-Based'}
              </button>
            ))}
          </div>
        </div>
        <button disabled={game.players.length===0} onClick={startGame}
          className="w-full bg-blue-900 text-white py-6 font-black text-2xl tracking-widest hover:bg-blue-800 disabled:opacity-30 disabled:cursor-not-allowed transition-all uppercase">
          ▶ Start Game
        </button>
      </div>
      {confirm && <ConfirmModal message={confirm.msg} onConfirm={confirm.fn} onCancel={() => setConfirm(null)} />}
    </div>
  );

  if (game.status === 'finished' && !showFinalBoard) {
    const sorted = [...game.players].sort((a,b) => calcTotal(b.scores) - calcTotal(a.scores));
    return (
      <div className="min-h-screen p-6 md:p-24 flex flex-col items-center justify-center text-center border-[12px] relative bg-[#fdfcf0] border-[#dcd7c9]">
        <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER} />
        <div className="max-w-3xl w-full relative z-10">
          <div className="text-6xl mb-8 animate-bounce">🏆</div>
          <h1 className="text-[clamp(60px,12vw,140px)] font-black uppercase leading-[0.8] tracking-[-6px] mb-4 font-hand text-blue-900">Game Over</h1>
          <p className="text-xl font-black uppercase tracking-[4px] mb-12 text-blue-900/40">Match #{game.matchNum}</p>
          <div className="grid gap-4 mb-12">
            {sorted.map((player, idx) => (
              <div key={player.id} className={`flex items-center justify-between p-6 border-4 ${idx===0?'border-blue-900 bg-white':'border-[#dcd7c9] bg-white/50'}`}>
                <div className="flex items-center gap-5">
                  <span className={`text-4xl font-black ${idx===0?'text-blue-900':'text-blue-900/40'}`}>#{idx+1}</span>
                  <h2 className="text-3xl md:text-4xl font-hand">{player.name}</h2>
                </div>
                <p className={`text-4xl md:text-5xl font-black ${idx===0?'text-accent':''}`}>{calcTotal(player.scores)}</p>
              </div>
            ))}
          </div>
          <div className="flex flex-col md:flex-row gap-4 justify-center">
            <button onClick={rematch} className="px-10 py-5 bg-blue-900 text-white font-black uppercase text-lg tracking-widest hover:bg-blue-800 transition-all">Rematch</button>
            <button onClick={() => setShowFinalBoard(true)} className="px-10 py-5 border-4 border-blue-900 text-blue-900 font-black uppercase text-lg tracking-widest hover:bg-white transition-all">See Scoreboard</button>
            <button onClick={() => setConfirm({ msg:'Exit to menu?', fn:() => { setGame(g=>({...g,status:'setup',players:[]})); setConfirm(null); }})}
              className="px-10 py-5 border-4 border-[#dcd7c9] text-blue-900/60 font-black uppercase text-lg tracking-widest hover:opacity-100 transition-all font-serif italic">Exit</button>
          </div>
        </div>
        {confirm && <ConfirmModal message={confirm.msg} onConfirm={confirm.fn} onCancel={() => setConfirm(null)} />}
      </div>
    );
  }

  return (
    <div className="min-h-screen p-4 md:p-12 border-[12px] relative bg-[#fdfcf0] border-[#dcd7c9]">
      <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER} />
      <header className="mb-10 flex flex-col md:flex-row justify-between items-end gap-4 border-b-4 pb-8 relative z-20 border-[#dcd7c9]">
        <div>
          <h1 className="text-[clamp(48px,8vw,90px)] font-black uppercase leading-none tracking-[-4px] font-hand text-blue-900">Yahtzee</h1>
          <p className="font-bold tracking-[2px] uppercase mt-1 text-sm">Match #{game.matchNum}</p>
        </div>
        <div className="flex flex-wrap gap-2 mb-1">
          {game.status === 'finished' ? (
            <>
              <button onClick={rematch} className="px-5 py-2 bg-blue-900 text-white font-black uppercase text-[10px] tracking-widest hover:bg-blue-800">Rematch</button>
              <button onClick={() => setShowFinalBoard(false)} className="px-5 py-2 border-2 border-blue-900 font-black uppercase text-[10px] tracking-widest">Back to Results</button>
            </>
          ) : (
            <>
              <button onClick={backToSetup} className="px-4 py-2 border-2 border-[#dcd7c9] text-blue-900/60 font-black uppercase text-[10px] tracking-widest hover:border-blue-900 hover:text-blue-900 transition-all">Edit Players</button>
              <button onClick={resetGame} className="px-5 py-2 bg-blue-900 text-white font-black uppercase text-[10px] tracking-widest hover:bg-blue-800">Restart</button>
            </>
          )}
        </div>
      </header>

      {game.mode === 'turn-based' && game.status === 'playing' && (
        <div className="mb-10 border-4 border-black p-6 bg-white shadow-[8px_8px_0px_rgba(0,0,0,1)]">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
              <span className="bg-accent text-white px-2 py-0.5 font-black text-[10px] uppercase tracking-widest">Active Turn</span>
              <h2 className="text-4xl font-black uppercase tracking-tight mt-1">{game.players[game.currentIdx]?.name}</h2>
            </div>
            <div>
              <div className="flex gap-2 mb-3">
                {dice.map((val, i) => (
                  <button key={i} onClick={() => toggleDie(i,1)} onContextMenu={e=>{e.preventDefault();toggleDie(i,-1);}}
                    className="w-12 h-12 bg-black text-white flex items-center justify-center text-xl font-black shadow-[3px_3px_0px_#e63946] select-none">
                    {val}
                  </button>
                ))}
              </div>
              {!turnProcessing
                ? <button onClick={() => setTurnProcessing(true)} className="w-full bg-black text-white py-2.5 font-black uppercase text-xs tracking-widest hover:bg-accent transition-all">Confirm Dice → Get Suggestions</button>
                : <button onClick={() => setTurnProcessing(false)} className="w-full border-2 border-black py-2.5 font-black uppercase text-xs tracking-widest hover:bg-gray-100">Change Dice</button>
              }
            </div>
          </div>
          {turnProcessing && (
            <div className="mt-6 pt-6 border-t-4 border-black border-dashed">
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2">
                {ALL_CATS.map(cat => {
                  const score = CALC_POINTS[cat]?.(dice) || 0;
                  const filled = game.players[game.currentIdx]?.scores[cat] !== undefined;
                  if (filled) return null;
                  return (
                    <button key={cat} onClick={() => updateScore(game.currentIdx, cat, score)}
                      className={`p-3 border-2 text-left bg-white ${score>0?'border-accent shadow-[3px_3px_0px_#e63946]':'opacity-40'}`}>
                      <span className="text-[9px] font-black uppercase tracking-tight block mb-1 opacity-60">{CATEGORY_LABELS[cat]}</span>
                      <span className="text-2xl font-black">{score}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      <div className="overflow-x-auto pb-8">
        <div className="inline-block min-w-full border-4 overflow-hidden bg-[#fdfcf0] border-[#dcd7c9]">
          <table className="w-full border-collapse">
            <thead>
              <tr className="border-b-4 border-[#dcd7c9]">
                <th className="p-3 text-left font-black text-xs uppercase tracking-widest sticky left-0 z-10 border-r-4 w-44 md:w-60 bg-[#fdfcf0] border-[#dcd7c9]">Category</th>
                {game.players.map((player, idx) => {
                  const active = game.status==='playing' && game.currentIdx===idx;
                  return (
                    <th key={player.id} className={`p-4 text-center border-l-2 min-w-[130px] md:min-w-[180px] ${active?'bg-blue-900/10':''} border-[#dcd7c9]`}>
                      <div className="text-[9px] font-black uppercase tracking-widest opacity-50 mb-1">Player</div>
                      <div className="text-2xl md:text-3xl font-hand font-black truncate">{player.name}</div>
                      <div className="text-lg font-serif italic mt-0.5 text-accent">{calcTotal(player.scores)} pts</div>
                      {active && <div className="w-full h-1 bg-blue-900 mt-2" />}
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              <SectionHeader title="Upper Section" />
              {UPPER_CATS.map(cat => <ScoreRow key={cat} category={cat} players={game.players} onClick={idx => setSelCat({playerIndex:idx,category:cat})} />)}
              <SummaryRow title="Upper Total" valueFn={calcUpper} players={game.players} />
              <SummaryRow title="Bonus +35 (need 63)" valueFn={s=>calcBonus(calcUpper(s))} players={game.players} />
              <SectionHeader title="Lower Section" />
              {LOWER_CATS.map(cat => <ScoreRow key={cat} category={cat} players={game.players} onClick={idx => setSelCat({playerIndex:idx,category:cat})} />)}
              <SummaryRow title="Lower Total" valueFn={calcLower} players={game.players} />
              <tr className="bg-[#f5f2e8]">
                <td className="p-5 font-black text-2xl uppercase tracking-tighter sticky left-0 z-10 border-t-4 border-r-4 bg-[#f5f2e8] border-[#dcd7c9]">Grand Total</td>
                {game.players.map(p => (
                  <td key={p.id} className="p-5 text-center border-l-2 border-t-4 bg-[#f5f2e8] border-[#dcd7c9]">
                    <span className="text-4xl font-black text-accent">{calcTotal(p.scores)}</span>
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {selCat && (
        <div className="fixed inset-0 bg-blue-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
          <div className="bg-[#fdfcf0] border-[6px] border-[#dcd7c9] p-8 rounded-none shadow-[24px_24px_0px_rgba(0,0,0,0.1)] max-w-lg w-full relative max-h-[90vh] overflow-y-auto">
            <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER} />
            <h3 className="text-4xl font-black uppercase font-hand text-blue-900 relative z-10">{CATEGORY_LABELS[selCat.category]}</h3>
            <div className="flex items-center gap-2 mb-1 relative z-10">
              <span className="font-black text-sm uppercase tracking-widest text-blue-900/60">{game.players[selCat.playerIndex]?.name}</span>
            </div>
            <p className="text-xs text-blue-800/50 mb-6 italic relative z-10">{CATEGORY_DESCRIPTIONS[selCat.category]}</p>
            <div className="mb-8 relative z-10">
              <label className="text-xs font-black uppercase tracking-[2px] text-blue-900 block mb-3">Dice Helper <span className="opacity-40 normal-case font-normal">(click +1, right-click -1)</span></label>
              <div className="grid grid-cols-6 gap-2">
                {dice.map((val, i) => (
                  <button key={i} onClick={() => toggleDie(i,1)} onContextMenu={e=>{e.preventDefault();toggleDie(i,-1);}}
                    className="w-full aspect-square bg-white border-2 border-[#dcd7c9] shadow-[2px_2px_0px_#888] hover:border-blue-900 transition-all select-none">
                    <Die value={val} />
                  </button>
                ))}
              </div>
              <button onClick={() => updateScore(selCat.playerIndex, selCat.category, CALC_POINTS[selCat.category]?.(dice)||0)}
                className="w-full mt-4 bg-blue-900 text-white py-4 font-black uppercase tracking-widest hover:bg-blue-800 transition-all">
                Apply: {CALC_POINTS[selCat.category]?.(dice)||0} pts
              </button>
            </div>
            <div className="pt-6 border-t-2 border-[#dcd7c9] space-y-4 relative z-10">
              <label className="text-xs font-black uppercase tracking-[2px] text-blue-900/60 block">
                Manual sum {CATEGORY_BONUSES[selCat.category] > 0 && `(+${CATEGORY_BONUSES[selCat.category]} bonus auto-added)`}
              </label>
              <div className="flex gap-3">
                <input type="number" autoFocus placeholder="Dice sum"
                  value={manualInput} onChange={e => setManualInput(e.target.value)}
                  onKeyDown={e => e.key==='Enter' && submitManual()}
                  className="flex-1 px-4 py-3 border-4 border-[#dcd7c9] font-hand text-3xl outline-none text-blue-900 focus:bg-white" />
                <button onClick={submitManual} className="bg-blue-900 text-white px-6 font-black uppercase text-sm tracking-widest hover:bg-blue-800">OK</button>
              </div>
              {manualInput !== '' && !isNaN(Number(manualInput)) && (() => {
                const final = computeManualScore(selCat.category, Number(manualInput));
                return final !== null && <p className="text-[10px] font-black uppercase text-blue-900">→ <span className="text-accent">{final} pts</span></p>;
              })()}
              <div className="grid grid-cols-2 gap-3 pt-2">
                <button onClick={() => setConfirm({ msg:`Scratch ${CATEGORY_LABELS[selCat.category]} for ${game.players[selCat.playerIndex]?.name}?`, fn:() => { updateScore(selCat.playerIndex, selCat.category, 'scratch'); setConfirm(null); }})}
                  className="py-3 border-4 border-red-200 text-red-600 font-black uppercase text-xs tracking-widest hover:bg-red-50">
                  ✕ Scratch (0 pts)
                </button>
                <button onClick={() => { setSelCat(null); setManualInput(''); setDice([1,1,1,1,1,1]); }}
                  className="py-3 bg-[#f5f2e8] text-gray-500 font-black uppercase text-xs tracking-widest hover:bg-white">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {confirm && <ConfirmModal message={confirm.msg} onConfirm={confirm.fn} onCancel={() => setConfirm(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
