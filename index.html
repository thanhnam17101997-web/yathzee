<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ─── SCORING ───────────────────────────────────────────────────────────────
const CATEGORY_LABELS = {
  ones:'Ones', twos:'Twos', threes:'Threes', fours:'Fours', fives:'Fives', sixes:'Sixes',
  twoPairs:'2 Pairs', threePairs:'3 Pairs', fourOfAKind:'4 of a Kind',
  fullHouse:'Full House', allRed:'All Red', lowestPoint:'Lowest Point',
  largeStraight:'Large Straight', yahtzee5:'Yahtzee (5)', yahtzee6:'Yahtzee (6)', chance:'Chance',
};
const CATEGORY_DESCRIPTIONS = {
  ones:'Sum of 1s only', twos:'Sum of 2s only', threes:'Sum of 3s only',
  fours:'Sum of 4s only', fives:'Sum of 5s only', sixes:'Sum of 6s only',
  twoPairs:'Two pairs. Sum of all dice', threePairs:'Three pairs. Sum of all dice',
  fourOfAKind:'4 same dice. Sum + 20 bonus', fullHouse:'3+2 or 4+2. Sum + 30 bonus',
  allRed:'All dice are 1 or 4. Fixed 40 pts', lowestPoint:'Sum ≤8:30, 9-11:20, 12-14:10 pts',
  largeStraight:'5 consecutive. Fixed 45 pts', yahtzee5:'5 same. Sum + 50 bonus',
  yahtzee6:'6 same. Sum + 75 bonus', chance:'Sum of all dice',
};
const CATEGORY_BONUSES = {
  ones:0, twos:0, threes:0, fours:0, fives:0, sixes:0,
  twoPairs:0, threePairs:0, fourOfAKind:20, fullHouse:30,
  allRed:0, lowestPoint:0, largeStraight:0, yahtzee5:50, yahtzee6:75, chance:0,
};
const UPPER_CATS = ['ones','twos','threes','fours','fives','sixes'];
const LOWER_CATS = ['twoPairs','threePairs','fourOfAKind','fullHouse','allRed','lowestPoint','largeStraight','yahtzee5','yahtzee6','chance'];
const ALL_CATS = [...UPPER_CATS, ...LOWER_CATS];

function getCounts(dice) {
  return dice.reduce((acc, d) => { acc[d] = (acc[d]||0)+1; return acc; }, {});
}
const TRADITIONAL_POINTS = {
  ones:(d)=>d.filter(x=>x===1).reduce((a,b)=>a+b,0),
  twos:(d)=>d.filter(x=>x===2).reduce((a,b)=>a+b,0),
  threes:(d)=>d.filter(x=>x===3).reduce((a,b)=>a+b,0),
  fours:(d)=>d.filter(x=>x===4).reduce((a,b)=>a+b,0),
  fives:(d)=>d.filter(x=>x===5).reduce((a,b)=>a+b,0),
  sixes:(d)=>d.filter(x=>x===6).reduce((a,b)=>a+b,0),
  twoPairs:(d)=>{const c=Object.values(getCounts(d)).filter(v=>v>=2);const s=d.reduce((a,b)=>a+b,0);return c.length>=2?s:0;},
  threePairs:(d)=>{const c=Object.values(getCounts(d)).filter(v=>v>=2);const s=d.reduce((a,b)=>a+b,0);return c.length>=3?s:0;},
  fourOfAKind:(d)=>{const s=d.reduce((a,b)=>a+b,0);return Object.values(getCounts(d)).some(c=>c>=4)?s+20:0;},
  fullHouse:(d)=>{const sc=Object.values(getCounts(d)).sort((a,b)=>b-a);const s=d.reduce((a,b)=>a+b,0);return sc[0]>=3&&sc[1]>=2?s+30:0;},
  allRed:(d)=>d.every(x=>x===1||x===4)?40:0,
  lowestPoint:(d)=>{const s=d.reduce((a,b)=>a+b,0);if(s<=8)return 30;if(s<=11)return 20;if(s<=14)return 10;return 0;},
  largeStraight:(d)=>{const u=Array.from(new Set(d)).sort((a,b)=>a-b);let max=0,cur=0;for(let i=0;i<u.length;i++){if(i>0&&u[i]===u[i-1]+1)cur++;else cur=1;max=Math.max(max,cur);}return max>=5?45:0;},
  yahtzee5:(d)=>{const s=d.reduce((a,b)=>a+b,0);return Object.values(getCounts(d)).some(c=>c>=5)?s+50:0;},
  yahtzee6:(d)=>{const s=d.reduce((a,b)=>a+b,0);return Object.values(getCounts(d)).some(c=>c>=6)?s+75:0;},
  chance:(d)=>d.reduce((a,b)=>a+b,0),
};

const getVal = v => v==='scratch'?0:(v||0);
function calcUpper(s){return UPPER_CATS.reduce((a,k)=>a+getVal(s[k]),0);}
function calcBonus(u){return u>=63?35:0;}
function calcLower(s){return LOWER_CATS.reduce((a,k)=>a+getVal(s[k]),0);}
function calcTotal(s){const u=calcUpper(s);return u+calcBonus(u)+calcLower(s);}

// Compute final score for manual entry (fixes the duplicate logic bug)
function computeManualScore(category, diceSum) {
  if (!diceSum && diceSum !== 0) return null;
  if (category === 'allRed') return diceSum > 0 ? 40 : 0;
  if (category === 'largeStraight') return diceSum > 0 ? 45 : 0;
  if (category === 'lowestPoint') {
    if (!diceSum) return 0;
    if (diceSum <= 8) return 30;
    if (diceSum <= 11) return 20;
    if (diceSum <= 14) return 10;
    return 0;
  }
  return diceSum + (diceSum > 0 ? CATEGORY_BONUSES[category] : 0);
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
const genId = () => { try { return crypto.randomUUID(); } catch(e) { return Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2); }};
const genMatch = () => ({ gameId: genId(), matchNumber: Math.floor(Math.random()*9000+1000) });

// ─── DIE COMPONENT ─────────────────────────────────────────────────────────
const DOT_POSITIONS = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
function Die({ value }) {
  const dots = DOT_POSITIONS[value] || [];
  return (
    <div className="grid grid-cols-3 gap-0.5 w-full h-full p-2.5">
      {[...Array(9)].map((_,i) => (
        <div key={i} className="flex items-center justify-center">
          {dots.includes(i) && <div className="w-2.5 h-2.5 rounded-full bg-blue-600 shadow-sm" />}
        </div>
      ))}
    </div>
  );
}

// ─── SCOREBOARD TABLE COMPONENTS ────────────────────────────────────────────
function SectionHeader({ title }) {
  return (
    <tr className="bg-[#dcd7c9]/30">
      <td colSpan={100} className="p-1 px-4">

      </td>

function ScoreRow({ category, players, onClick }) {
  const bonus = CATEGORY_BONUSES[category] || 0;
  const desc = CATEGORY_DESCRIPTIONS[category] || '';
  return (
    <tr className="border-b-2 last:border-0 group transition-colors hover:bg-blue-50/50 border-[#dcd7c9]/50">
      <td className="p-4 font-black text-sm uppercase tracking-tighter border-r-4 sticky left-0 z-10 transition-colors bg-[#fdfcf0] border-[#dcd7c9] group-hover:bg-[#f5f2e8]">
        <div className="flex flex-col items-start gap-1">
          <span className="leading-none mb-1">{CATEGORY_LABELS[category]}</span>
          {desc && <span className="text-[8px] font-bold text-gray-400 capitalize whitespace-nowrap">{desc}</span>}
          {bonus > 0 && <span className="text-[10px] px-1 py-0.5 bg-blue-100 text-blue-800 mt-1">+{bonus} Bonus</span>}
        </div>
      </td>
      {players.map((player, idx) => {
        const val = player.scores[category];
        const isFilled = val !== undefined;
        return (
          <td key={player.id} onClick={() => onClick(idx)}
            className={`p-5 text-center cursor-pointer border-l-2 transition-all font-black text-2xl border-[#dcd7c9]/50 ${
              isFilled ? (val === 'scratch' ? 'bg-red-50/30 text-red-400 italic text-xl' : 'bg-transparent text-blue-800 font-hand text-3xl') : 'text-[#dcd7c9]/40 hover:text-blue-400'
            }`}>
            {isFilled ? (val === 'scratch' ? 'SCRATCH' : val) : '-'}
          </td>
        );
      })}
    </tr>
  );
}

}

// ─── SYNC STATUS ──────────────────────────────────────────────────────────
function SyncStatus({ isSyncing }) {
  return (
    <div className="fixed bottom-4 right-4 z-[400] flex flex-col items-end gap-2">
      <div className="px-3 py-1 bg-green-500/10 text-green-700 border border-green-200 rounded-full flex items-center gap-2 text-[9px] font-black uppercase tracking-widest">

      <div className={`px-3 py-1.5 rounded-full flex items-center gap-2 text-[10px] font-black uppercase tracking-widest transition-colors ${
        isSyncing ? 'bg-blue-900 text-white' : 'bg-[#fdfcf0] text-blue-900/40 border border-[#dcd7c9] opacity-40'
      }`}>
        {isSyncing ? <><span className="animate-spin inline-block">☁</span> Syncing...</> : <>☁ Cloud Active</>}
      </div>
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [fb, setFb] = useState(null);

  // Wait for Firebase to load
  useEffect(() => {
    const onReady = () => setFb(window.__firebase);
    if (window.__firebase) onReady();
    else window.addEventListener('firebase-ready', onReady);
    return () => window.removeEventListener('firebase-ready', onReady);
  }, []);

  const [gameState, setGameState] = useState(() => {
    try {
      const saved = localStorage.getItem('yahtzee_current_game');
      if (saved) {
        const p = JSON.parse(saved);
        if (p?.players && Array.isArray(p.players)) return p;
      }
    } catch(e) {}
    return { players: [], status: 'setup', currentPlayerIndex: 0, mode: 'free', ...genMatch() };
  });

  useEffect(() => {
    localStorage.setItem('yahtzee_current_game', JSON.stringify(gameState));
  }, [gameState]);

  const [newPlayerName, setNewPlayerName] = useState('');
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [diceInput, setDiceInput] = useState([1,1,1,1,1,1]);
  const [manualScore, setManualScore] = useState('');
  const [isTurnProcessing, setIsTurnProcessing] = useState(false);
  const [showFinalScoreboard, setShowFinalScoreboard] = useState(false);
  const [showStats, setShowStats] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [confirmModal, setConfirmModal] = useState(null);
  const [isSyncing, setIsSyncing] = useState(false);
  const [stats, setStats] = useState({});
  const [history, setHistory] = useState([]);
  const statsSavedForGame = useRef(null);

  // Firebase realtime sync
  useEffect(() => {
    if (!fb) return;
    const { collection, query, orderBy, limit, onSnapshot, db } = fb;
    const unsub1 = onSnapshot(query(collection(db,'stats')), snap => {
      const s = {};
      snap.forEach(d => { s[d.id] = d.data(); });
      setStats(s);
    }, console.error);
    const unsub2 = onSnapshot(query(collection(db,'history'), orderBy('date','desc'), limit(50)), snap => {
      const h = [];
      snap.forEach(d => h.push(d.data()));
      setHistory(h);
    }, console.error);
    return () => { unsub1(); unsub2(); };
  }, [fb]);

  // Save to cloud on game finish
  useEffect(() => {
    if (!fb || gameState.status !== 'finished' || statsSavedForGame.current === gameState.gameId) return;
    const save = async () => {
      setIsSyncing(true);
      try {
        const { db, doc, setDoc, getDoc, writeBatch, serverTimestamp } = fb;
        const playerScores = gameState.players.map(p => ({ name: p.name, score: calcTotal(p.scores) }));
        const maxScore = Math.max(...playerScores.map(p => p.score));
        const winners = playerScores.filter(p => p.score === maxScore).map(p => p.name);

        await setDoc(doc(db,'history',gameState.gameId), {
          id: gameState.gameId, date: new Date().toISOString(),
          matchNumber: gameState.matchNumber, players: playerScores,
          winners, serverCreatedAt: serverTimestamp()
        });

        // Use transactions-style: read all in parallel, then batch write
        const statRefs = playerScores.map(({name}) => doc(db,'stats',name));
        const statDocs = await Promise.all(statRefs.map(r => getDoc(r)));
        const batch = writeBatch(db);
        playerScores.forEach(({name, score}, i) => {
          const existing = statDocs[i].exists() ? statDocs[i].data() : null;
          batch.set(statRefs[i], existing ? {
            name, gamesPlayed: existing.gamesPlayed+1,
            highestScore: Math.max(existing.highestScore, score),
            wins: winners.includes(name) ? existing.wins+1 : existing.wins
          } : { name, gamesPlayed:1, highestScore:score, wins: winners.includes(name)?1:0 });
        });
        await batch.commit();
        statsSavedForGame.current = gameState.gameId;
      } catch(e) { console.error('Cloud sync failed:', e); }
      finally { setIsSyncing(false); }
    };
    save();
  }, [gameState.status, gameState.gameId, fb]);

  // ── Actions ──
  const toggleDie = (i, dir=1) => setDiceInput(prev => {
    const n=[...prev]; n[i]=((n[i]-1+dir+6)%6)+1; return n;
  });

  const addPlayer = () => {
    if (!newPlayerName.trim()) return;
    setGameState(prev => ({ ...prev, players: [...prev.players, { id: genId(), name: newPlayerName.trim(), scores: {} }] }));
    setNewPlayerName('');
  };
  const removePlayer = id => setGameState(prev => ({ ...prev, players: prev.players.filter(p => p.id !== id) }));
  const movePlayer = (idx, dir) => setGameState(prev => {
    const ps = [...prev.players], ni = dir==='up'?idx-1:idx+1;
    if (ni<0||ni>=ps.length) return prev;
    const [m] = ps.splice(idx,1); ps.splice(ni,0,m);
    return {...prev, players:ps};
  });

  const freshMatchState = (keep) => ({ ...keep, ...genMatch(), status:'playing', currentPlayerIndex:0, players: keep.players.map(p=>({...p,scores:{}})) });

  const startGame = () => gameState.players.length && setGameState(prev => ({ ...prev, ...genMatch(), status:'playing' }));
  const resetGame = () => setConfirmModal({ message:'Start a new match? All scores will be cleared.', onConfirm:() => { setGameState(prev => freshMatchState(prev)); setConfirmModal(null); }});
  const handleRematch = () => { setGameState(prev => freshMatchState(prev)); setShowFinalScoreboard(false); setDiceInput([1,1,1,1,1,1]); };
  const backToSetup = () => {
    if (gameState.status==='playing' && gameState.players.some(p=>Object.keys(p.scores).length>0)) {
      setConfirmModal({ message:'Return to setup? Progress will be paused.', onConfirm:() => { setGameState(prev=>({...prev,status:'setup'})); setConfirmModal(null); }});
    } else setGameState(prev=>({...prev,status:'setup'}));
  };
  const simulateFull = () => setConfirmModal({
    message:'Fill all scores randomly and end match immediately?',
    onConfirm:() => {
      setGameState(prev => ({...prev,
        players:prev.players.map(p=>({...p, scores:ALL_CATS.reduce((a,c)=>{a[c]=Math.floor(Math.random()*60);return a;},{})})),
        status:'finished'
      }));
      setConfirmModal(null);
    }
  });

  const updateScore = (playerIndex, category, score) => {
    setGameState(prev => {
      const newPlayers = prev.players.map((p,i) => i===playerIndex ? {...p, scores:{...p.scores,[category]:score}} : p);
      const allDone = newPlayers.every(p => Object.keys(p.scores).length === ALL_CATS.length);
      const nextIdx = prev.mode==='turn-based' ? (prev.currentPlayerIndex+1)%prev.players.length : prev.currentPlayerIndex;
      return {...prev, players:newPlayers, currentPlayerIndex:nextIdx, status:allDone?'finished':prev.status};
    });
    setSelectedCategory(null); setManualScore(''); setIsTurnProcessing(false); setDiceInput([1,1,1,1,1,1]);
  };

  // Fixed clear functions — now also deletes from Firestore
  const clearStats = () => setConfirmModal({
    message:'Clear all lifetime statistics? This cannot be undone.',
    onConfirm: async () => {
      setConfirmModal(null);
      if (fb) {
        const { db, collection, getDocs, deleteDoc } = fb;
        const snap = await getDocs(collection(db,'stats'));
        snap.forEach(d => deleteDoc(d.ref));
      }
    }
  });
  const clearHistory = () => setConfirmModal({
    message:'Clear match history? This cannot be undone.',
    onConfirm: async () => {
      setConfirmModal(null);
      if (fb) {
        const { db, collection, getDocs, deleteDoc } = fb;
        const snap = await getDocs(collection(db,'history'));
        snap.forEach(d => deleteDoc(d.ref));
      }
    }
  });

  const submitManualScore = () => {
    if (!selectedCategory || manualScore === '') return;
    const sum = Number(manualScore);
    if (isNaN(sum)) return;
    const final = computeManualScore(selectedCategory.category, sum);
    if (final !== null) updateScore(selectedCategory.playerIndex, selectedCategory.category, final);
  };

  // Shared modals block (rendered once instead of 3x)
  const GlobalModals = () => (
    <>
      {showStats && <StatsModal stats={stats} onClose={() => setShowStats(false)} onClear={clearStats} />}
      {showHistory && <HistoryModal history={history} onClose={() => setShowHistory(false)} onClear={clearHistory} />}
      {confirmModal && <ConfirmModal message={confirmModal.message} onConfirm={confirmModal.onConfirm} onCancel={() => setConfirmModal(null)} />}
    </>
  );

  // ── SETUP SCREEN ──
  if (gameState.status === 'setup') {
    return (
      <div className="min-h-screen font-sans p-6 md:p-12 flex flex-col items-center border-[12px] bg-[#fdfcf0] text-[#1a1a1a] border-[#dcd7c9] relative">
        <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER_BG} />
        <header className="max-w-2xl w-full mb-12 border-b-4 pb-10 border-[#dcd7c9] relative">
          <h1 className="text-[clamp(60px,15vw,120px)] font-black tracking-[-6px] mb-2 uppercase leading-[0.8] font-hand text-blue-900">Yahtzee</h1>
          <div className="flex justify-between items-end mt-4">
            <p className="font-bold tracking-[3px] uppercase">Scoreboard Pro v1.0</p>
            <p className="font-serif italic text-lg text-gray-500">Standard Scoring Rules</p>
          </div>
        </header>

        <div className="max-w-md w-full border-4 border-black p-8 bg-white">
          <div className="flex gap-2 mb-10">
            <input type="text" value={newPlayerName} onChange={e=>setNewPlayerName(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addPlayer()} placeholder="PLAYER NAME"
              className="flex-1 px-4 py-4 border-2 border-black rounded-none focus:outline-none focus:bg-gray-50 font-black uppercase text-sm tracking-widest" />
            <button onClick={addPlayer} className="bg-blue-900 text-white px-6 hover:bg-blue-800 transition-colors font-black shadow-[3px_3px_0px_#dcd7c9]">ADD</button>
          </div>

          <div className="space-y-4 mb-10">
            {gameState.players.map((player, idx) => (
              <div key={player.id} className="flex items-center justify-between p-4 border-2 border-[#dcd7c9] bg-[#f5f2e8]/50 group">
                <div className="flex items-center gap-3">
                  <div className="flex flex-col gap-1">
                    <button onClick={() => movePlayer(idx,'up')} disabled={idx===0} className="text-[#dcd7c9] hover:text-blue-900 disabled:opacity-20">▲</button>
                    <button onClick={() => movePlayer(idx,'down')} disabled={idx===gameState.players.length-1} className="text-[#dcd7c9] hover:text-blue-900 disabled:opacity-20">▼</button>
                  </div>
                  <div className="w-8 h-8 bg-blue-900 text-white flex items-center justify-center font-black text-xs">#{idx+1}</div>
                  <span className="font-hand text-2xl text-blue-800">{player.name}</span>
                </div>
                <button onClick={() => removePlayer(player.id)} className="text-gray-400 hover:text-accent transition-colors">✕</button>
              </div>
            ))}
            {gameState.players.length === 0 && (
              <p className="text-center py-12 text-gray-400 font-serif italic border-2 border-dashed border-[#dcd7c9]">Assemble your team</p>
            )}
          </div>

          <div className="mb-10 p-4 border-2 border-[#dcd7c9] bg-[#f5f2e8]/50">
            <label className="text-xs font-black uppercase tracking-widest block mb-4">Select Game Mode</label>
            <div className="grid grid-cols-2 gap-2">
              {['free','turn-based'].map(m => (
                <button key={m} onClick={() => setGameState(prev=>({...prev,mode:m}))}
                  className={`py-3 font-black uppercase text-xs tracking-widest border-2 transition-all ${gameState.mode===m?'bg-blue-900 text-white border-blue-900':'bg-white text-blue-900 border-[#dcd7c9]'}`}>
                  {m==='free'?'Free Score':'Turn-Based'}
                </button>
              ))}
            </div>
            <p className="mt-3 text-[10px] uppercase font-bold text-gray-400">
              {gameState.mode==='free'?'Manual entry for any player at any time.':'Turn-by-turn logic with dice suggestions.'}
            </p>
          </div>

          <button disabled={gameState.players.length===0} onClick={startGame}
            className="w-full bg-blue-900 text-white py-6 flex items-center justify-center gap-3 font-black text-2xl tracking-widest hover:bg-blue-800 disabled:opacity-30 disabled:cursor-not-allowed transition-all uppercase shadow-[4px_4px_0px_#dcd7c9]">
            ▶ Start Game
          </button>
          <button onClick={() => setShowStats(true)} className="w-full mt-4 flex items-center justify-center gap-2 py-4 border-2 border-[#dcd7c9] text-blue-900 font-black uppercase text-xs tracking-widest hover:bg-white transition-all">
            ⊞ View Lifetime Stats
          </button>
          <button onClick={() => setShowHistory(true)} className="w-full mt-2 flex items-center justify-center gap-2 py-4 border-2 border-[#dcd7c9] text-blue-900/60 font-black uppercase text-[10px] tracking-widest hover:bg-white transition-all italic">
            ≡ Match History
          </button>
        </div>
        <GlobalModals />
      </div>
    );
  }

  // ── GAME OVER SCREEN ──
  if (gameState.status === 'finished' && !showFinalScoreboard) {
    const sorted = [...gameState.players].sort((a,b) => calcTotal(b.scores)-calcTotal(a.scores));
    return (
      <div className="min-h-screen p-6 md:p-24 flex flex-col items-center justify-center text-center border-[12px] relative bg-[#fdfcf0] text-[#1a1a1a] border-[#dcd7c9]">
        <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER_BG} />
        <div className="max-w-4xl w-full relative z-10">
          <div className="text-6xl mb-8 animate-bounce">🏆</div>
          <h1 className="text-[clamp(60px,12vw,140px)] font-black uppercase leading-[0.8] tracking-[-6px] mb-4 font-hand text-blue-900">Game Over</h1>
          <p className="text-2xl font-black uppercase tracking-[4px] mb-12 text-blue-900/40">Final Results & Rankings</p>
          <div className="grid gap-6 mb-16">
            {sorted.map((player, idx) => (
              <div key={player.id} className={`flex items-center justify-between p-8 border-4 shadow-[8px_8px_0px_rgba(0,0,0,0.05)] ${idx===0?'border-blue-900 bg-white text-blue-900':'border-[#dcd7c9] bg-white/50 text-blue-900/60'}`}>
                <div className="flex items-center gap-6">
                  <span className={`text-5xl font-black ${idx===0?'text-blue-900':'text-blue-900/40'}`}>#{idx+1}</span>
                  <div className="text-left">
                    <p className="text-[10px] font-black uppercase tracking-widest opacity-40">Player</p>
                    <h2 className="text-4xl md:text-5xl font-hand uppercase">{player.name}</h2>
                  </div>
                </div>
                <div className="text-right">
                  <p className="text-[10px] font-black uppercase tracking-widest opacity-40">Final Score</p>
                  <p className={`text-5xl md:text-6xl font-black ${idx===0?'text-accent font-hand':''}`}>{calcTotal(player.scores)}</p>
                </div>
              </div>
            ))}
          </div>
          <div className="flex flex-col md:flex-row gap-4 justify-center">
            <button onClick={handleRematch} className="px-12 py-6 bg-blue-900 text-white font-black uppercase text-xl tracking-widest hover:bg-blue-800 transition-all shadow-[6px_6px_0px_#dcd7c9]">Rematch</button>
            <button onClick={() => setShowFinalScoreboard(true)} className="px-12 py-6 border-4 border-blue-900 text-blue-900 font-black uppercase text-xl tracking-widest hover:bg-white transition-all">See Scoreboard</button>
            <button onClick={() => setConfirmModal({ message:'Exit to home? Scores will be cleared.', onConfirm:() => { setGameState(prev=>({...prev,status:'setup',players:[]})); setShowFinalScoreboard(false); setConfirmModal(null); }})}
              className="px-12 py-6 border-4 border-[#dcd7c9] text-blue-900 font-black uppercase text-xl tracking-widest opacity-60 hover:opacity-100 transition-all font-serif italic">Exit to Menu</button>
          </div>
        </div>
        <GlobalModals />
      </div>
    );
  }

  // ── MAIN SCOREBOARD ──
  return (
    <div className="min-h-screen p-4 md:p-12 border-[12px] relative z-0 bg-[#fdfcf0] text-[#1a1a1a] border-[#dcd7c9]">
      <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER_BG} />

      <header className="max-w-full mb-12 flex flex-col md:flex-row justify-between items-end gap-4 border-b-4 pb-10 relative z-20 border-[#dcd7c9]">
        <div>
          <h1 className="text-[clamp(60px,10vw,110px)] font-black uppercase leading-[0.8] tracking-[-4px] font-hand text-blue-900 opacity-80">Yahtzee</h1>
          <p className="font-bold tracking-[2px] uppercase mt-2">Custom Scoreboard v1.0</p>
        </div>
        <div className="flex flex-col items-end gap-2 mb-2 font-serif italic text-lg text-gray-500">
          <p>Match #{gameState.matchNumber}</p>
          <div className="flex flex-wrap gap-2 mt-4 justify-end">
            <button onClick={() => setShowHistory(true)} className="px-4 py-2 border-2 border-dashed border-gray-400 font-black uppercase text-[10px] tracking-widest text-gray-500 hover:text-black hover:border-black transition-all">History</button>
            <button onClick={() => setShowStats(true)} className="px-4 py-2 border-2 border-blue-900/30 font-black uppercase text-[10px] tracking-widest text-blue-900 opacity-60 hover:opacity-100 hover:border-blue-900 transition-all">Stats</button>
            {gameState.status === 'finished' ? (
              <>
                <button onClick={handleRematch} className="px-6 py-2 border-2 border-blue-900 bg-blue-900 text-white font-black uppercase text-[10px] tracking-widest hover:bg-blue-800 shadow-[3px_3px_0px_#dcd7c9]">Rematch</button>
                <button onClick={() => setShowFinalScoreboard(false)} className="px-6 py-2 border-2 border-blue-900 font-black uppercase text-[10px] tracking-widest hover:bg-white">Back to Results</button>
              </>
            ) : (
              <>
                <button onClick={backToSetup} className="px-4 py-2 border-2 border-blue-900/30 text-blue-900/60 font-black uppercase text-[10px] tracking-widest hover:text-blue-900 hover:border-blue-900 transition-all">Edit Players</button>
                <button onClick={resetGame} className="px-4 py-2 border-2 border-blue-900 bg-blue-900 text-white font-black uppercase text-[10px] tracking-widest hover:bg-blue-800 shadow-[3px_3px_0px_#dcd7c9]">Restart</button>
                <button onClick={simulateFull} className="px-4 py-2 border-2 border-dashed border-blue-900/20 font-black uppercase text-[10px] tracking-widest text-blue-900/30 hover:text-blue-900 transition-all">Simulate</button>
              </>
            )}
          </div>
        </div>
      </header>

      {/* Turn Manager */}
      {gameState.mode === 'turn-based' && gameState.status === 'playing' && (
        <div className="mb-12 border-4 border-black p-8 bg-white shadow-[12px_12px_0px_rgba(0,0,0,1)]">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
            <div className="flex-1">
              <div className="flex items-center gap-4 mb-2">
                <span className="bg-accent text-white px-3 py-1 font-black text-xs uppercase tracking-widest">Active Turn</span>
              </div>
              <h2 className="text-5xl font-black uppercase tracking-[-2px]">{gameState.players[gameState.currentPlayerIndex]?.name}</h2>
            </div>
            <div>
              <div className="flex gap-2 mb-3">
                {diceInput.map((val, i) => (
                  <button key={i} onClick={() => toggleDie(i,1)} onContextMenu={e=>{e.preventDefault();toggleDie(i,-1);}}
                    className="w-14 h-14 bg-black text-white flex items-center justify-center text-2xl font-black shadow-[4px_4px_0px_#e63946] cursor-pointer select-none">
                    {val}
                  </button>
                ))}
              </div>
              {!isTurnProcessing
                ? <button onClick={() => setIsTurnProcessing(true)} className="w-full bg-black text-white py-3 font-black uppercase tracking-widest text-sm hover:bg-accent transition-all">Confirm Dice & Get Suggestions</button>
                : <button onClick={() => setIsTurnProcessing(false)} className="w-full border-2 border-black py-3 font-black uppercase tracking-widest text-sm hover:bg-gray-100 transition-all">Change Dice</button>
              }
            </div>
          </div>
          {isTurnProcessing && (
            <div className="mt-8 pt-8 border-t-4 border-black border-dashed">
              <h3 className="text-xs font-black uppercase tracking-[2px] mb-6">Suggested Scorings</h3>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                {ALL_CATS.map(cat => {
                  const score = TRADITIONAL_POINTS[cat]?.(diceInput) || 0;
                  const isFilled = gameState.players[gameState.currentPlayerIndex]?.scores[cat] !== undefined;
                  if (isFilled) return null;
                  return (
                    <button key={cat} onClick={() => updateScore(gameState.currentPlayerIndex, cat, score)}
                      className={`p-4 border-2 border-black hover:scale-[1.02] transition-all text-left flex flex-col justify-between bg-white group ${score>0?'border-accent shadow-[4px_4px_0px_#e63946]':'opacity-40 grayscale hover:grayscale-0'}`}>
                      <span className="text-[10px] font-black uppercase tracking-tighter opacity-60 mb-1 leading-tight">{CATEGORY_LABELS[cat]}</span>
                      <span className="text-3xl font-black group-hover:text-accent">{score}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Scoreboard Table */}
      <div className="max-w-full overflow-x-auto pb-8">
        <div className="inline-block min-w-full border-4 overflow-hidden shadow-2xl bg-[#fdfcf0] border-[#dcd7c9]">
          <table className="w-full border-collapse">
            <thead>
              <tr className="border-b-4 border-[#dcd7c9]">
                <th className="p-4 text-left font-black text-xs uppercase tracking-widest sticky left-0 z-10 border-r-4 w-48 md:w-64 bg-[#fdfcf0] border-[#dcd7c9]">Category</th>
                {gameState.players.map((player, idx) => {
                  const isCurrent = gameState.status==='playing' && gameState.currentPlayerIndex===idx;
                  return (
                    <th key={player.id} className={`p-4 text-center border-l-2 min-w-[140px] md:min-w-[200px] transition-colors ${isCurrent?'bg-blue-900/10':''} border-[#dcd7c9]`}>
                      <div className={`text-[10px] font-black uppercase mb-1 tracking-widest ${isCurrent?'opacity-80':'opacity-60'}`}>Player</div>
                      <div className="text-2xl md:text-3xl font-black truncate font-hand">{player.name}</div>
                      <div className="text-xl font-serif italic mt-1 text-accent">{calcTotal(player.scores)} Pts</div>
                      {isCurrent && <div className="w-full h-1 bg-blue-900 mt-2" />}
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              <SectionHeader title="Upper Section" />
              {UPPER_CATS.map(cat => <ScoreRow key={cat} category={cat} players={gameState.players} onClick={pIdx => setSelectedCategory({playerIndex:pIdx,category:cat})} />)}
              <SummaryRow title="Upper Total" valueFn={calcUpper} players={gameState.players} />
              <SummaryRow title="Bonus (+35)" valueFn={s=>calcBonus(calcUpper(s))} players={gameState.players} />
              <SectionHeader title="Lower Section" />
              {LOWER_CATS.map(cat => <ScoreRow key={cat} category={cat} players={gameState.players} onClick={pIdx => setSelectedCategory({playerIndex:pIdx,category:cat})} />)}
              <SummaryRow title="Lower Total" valueFn={calcLower} players={gameState.players} />
              <tr className="bg-[#f5f2e8]">
                <td className="p-6 font-black text-3xl uppercase tracking-tighter sticky left-0 z-10 border-t-4 border-r-4 bg-[#f5f2e8] border-[#dcd7c9]">Grand Total</td>
                {gameState.players.map(player => (
                  <td key={player.id} className="p-6 text-center border-l-2 border-t-4 bg-[#f5f2e8] border-[#dcd7c9]">
                    <span className="text-5xl font-black text-accent">{calcTotal(player.scores)}</span>
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* Score Entry Modal */}
      {selectedCategory && (
        <div className="fixed inset-0 bg-blue-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
          <div className="bg-[#fdfcf0] border-[6px] border-[#dcd7c9] p-8 md:p-10 rounded-none shadow-[24px_24px_0px_rgba(0,0,0,0.1)] max-w-lg w-full relative max-h-[90vh] overflow-y-auto">
            <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={PAPER_BG} />
            <h3 className="text-5xl font-black mb-2 uppercase leading-none tracking-tighter font-hand text-blue-900 relative z-10">Score Entry</h3>
            <div className="flex items-center gap-2 mb-2 text-sm font-black uppercase tracking-widest text-blue-900/50 relative z-10">
              <span className="bg-blue-900 text-white px-2 py-1">{CATEGORY_LABELS[selectedCategory.category]}</span>
              <span>•</span>
              <span>{gameState.players[selectedCategory.playerIndex]?.name}</span>
            </div>
            <p className="text-xs font-bold text-blue-800/60 mb-8 relative z-10 italic">Rule: {CATEGORY_DESCRIPTIONS[selectedCategory.category]}</p>

            {/* Dice Helper */}
            <div className="mb-10 relative z-10">
              <div className="flex justify-between items-center mb-4">
                <label className="text-xs font-black uppercase tracking-[2px] text-blue-900">Dice Helper</label>
                <span className="text-[10px] font-bold uppercase text-blue-900/40 hidden md:block">Tap: +1 | Long-press: -1</span>
              </div>
              <div className="grid grid-cols-6 gap-2 sm:gap-4">
                {diceInput.map((val, i) => (
                  <button key={i} onClick={() => toggleDie(i,1)} onContextMenu={e=>{e.preventDefault();toggleDie(i,-1);}}
                    className="w-full aspect-square rounded-none flex items-center justify-center cursor-pointer select-none bg-white border-2 border-[#dcd7c9] shadow-[3px_3px_0px_#888] hover:border-blue-900 transition-all">
                    <Die value={val} />
                  </button>
                ))}
              </div>
              <button onClick={() => updateScore(selectedCategory.playerIndex, selectedCategory.category, TRADITIONAL_POINTS[selectedCategory.category]?.(diceInput)||0)}
                className="w-full mt-6 bg-blue-900 text-white py-5 font-black uppercase text-lg tracking-widest hover:bg-blue-800 transition-all shadow-[4px_4px_0px_#dcd7c9]">
                Apply Calculated: {TRADITIONAL_POINTS[selectedCategory.category]?.(diceInput)||0} Pts
              </button>
            </div>

            {/* Manual Entry */}
            <div className="space-y-6 pt-8 border-t-2 border-[#dcd7c9] relative z-10">
              <div>
                <label className="text-xs font-black uppercase tracking-[2px] block mb-4 text-blue-900/60">
                  Manual Dice Sum {CATEGORY_BONUSES[selectedCategory.category] > 0 && `(+${CATEGORY_BONUSES[selectedCategory.category]} bonus)`}
                </label>
                <div className="flex gap-3">
                  <input type="number" autoFocus placeholder="Enter Dice Sum"
                    value={manualScore} onChange={e => setManualScore(e.target.value)}
                    onKeyDown={e => e.key==='Enter' && submitManualScore()}
                    className="flex-1 px-4 py-4 border-4 border-[#dcd7c9] font-hand text-3xl focus:bg-white outline-none text-blue-900" />
                  <button onClick={submitManualScore} className="bg-blue-900 text-white px-8 font-black uppercase text-sm tracking-widest hover:bg-blue-800 shadow-[4px_4px_0px_#dcd7c9]">Enter</button>
                </div>
                {manualScore !== '' && !isNaN(Number(manualScore)) && (() => {
                  const final = computeManualScore(selectedCategory.category, Number(manualScore));
                  return final !== null && (
                    <p className="mt-2 text-[10px] font-black uppercase text-blue-900">
                      → Result: <span className="text-accent">{final} pts</span>
                    </p>
                  );
                })()}
              </div>
              <div className="grid grid-cols-2 gap-4">
                <button onClick={() => setConfirmModal({
                  message: `Scratch ${CATEGORY_LABELS[selectedCategory.category]} for ${gameState.players[selectedCategory.playerIndex]?.name}?`,
                  onConfirm: () => { updateScore(selectedCategory.playerIndex, selectedCategory.category, 'scratch'); setConfirmModal(null); }
                })} className="py-4 border-4 border-red-200 text-red-600 font-black uppercase text-xs tracking-widest hover:bg-red-50 transition-colors flex items-center justify-center gap-2">
                  ✕ Confirm Scratch (0)
                </button>
                <button onClick={() => { setSelectedCategory(null); setManualScore(''); setDiceInput([1,1,1,1,1,1]); }}
                  className="py-4 bg-[#f5f2e8] text-gray-500 font-black uppercase text-xs tracking-widest hover:bg-white transition-colors">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      <GlobalModals />
      <SyncStatus isSyncing={isSyncing} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
